<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FDB813"/>
      <stop offset="100%" stop-color="#F57F20"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" rx="80" fill="url(#bg)"/>
  <!-- sun rays -->
  <g stroke="#FFF" stroke-width="18" stroke-linecap="round" opacity="0.9">
    <line x1="200" y1="60" x2="200" y2="90"/>
    <line x1="200" y1="340" x2="200" y2="310"/>
    <line x1="60" y1="200" x2="90" y2="200"/>
    <line x1="340" y1="200" x2="310" y2="200"/>
    <line x1="101" y1="101" x2="122" y2="122"/>
    <line x1="299" y1="101" x2="278" y2="122"/>
    <line x1="101" y1="299" x2="122" y2="278"/>
    <line x1="299" y1="299" x2="278" y2="278"/>
  </g>
  <!-- watch face -->
  <circle cx="200" cy="200" r="85" fill="#FFF" opacity="0.95"/>
  <circle cx="200" cy="200" r="75" fill="none" stroke="#333" stroke-width="6"/>
  <!-- clock hands -->
  <line x1="200" y1="200" x2="200" y2="150" stroke="#333" stroke-width="8" stroke-linecap="round"/>
  <line x1="200" y1="200" x2="235" y2="215" stroke="#F57F20" stroke-width="8" stroke-linecap="round"/>
  <circle cx="200" cy="200" r="8" fill="#333"/>
  <!-- ticks -->
  <g stroke="#666" stroke-width="4" stroke-linecap="round">
    <line x1="200" y1="132" x2="200" y2="142"/>
    <line x1="268" y1="200" x2="258" y2="200"/>
    <line x1="200" y1="268" x2="200" y2="258"/>
    <line x1="132" y1="200" x2="142" y2="200"/>
  </g>
</svg>